name: QuranDock
options:
  bundleIdPrefix: com.qurandock
  deploymentTarget:
    macOS: "13.0"

targets:
  QuranDock:
    type: application
    platform: macOS
    sources:
      - path: QuranDock
    postCompileScripts:
      - script: |
          cp "${SRCROOT}/QuranDock/Resources/yt-dlp" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/yt-dlp"
          chmod +x "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/yt-dlp"
        name: Bundle yt-dlp
    info:
      path: QuranDock/Info.plist
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.qurandock.app
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
